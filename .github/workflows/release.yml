name: Windows-Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: pnpm einrichten
        uses: pnpm/action-setup@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Rust einrichten
        uses: dtolnay/rust-toolchain@stable

      - name: Rust-Builds zwischenspeichern
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Tag und App-Version vergleichen
        shell: pwsh
        run: |
          $version = (Get-Content apps/desktop/src-tauri/tauri.conf.json | ConvertFrom-Json).version
          if ($env:GITHUB_REF_NAME -ne "v$version") {
            throw "Tag $env:GITHUB_REF_NAME passt nicht zur App-Version $version"
          }

      - name: Abhängigkeiten installieren
        run: pnpm install --frozen-lockfile

      - name: Installer signieren und Release veröffentlichen
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          tagName: v__VERSION__
          releaseName: "Werkstatt Motion v__VERSION__"
          releaseBody: |
            Windows-Installer für Werkstatt Motion.

            Vor jedem automatischen Update erstellt die App ein Sicherheits-Backup
            im Ordner `Backups` neben der installierten Programmdatei.
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          updaterJsonPreferNsis: true

